<!DOCTYPE html>
<html>
<head>
  <title>Shop - Football Store</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: black;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      background: #111;
    }

    h1 {
      color: lime;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 30px;
    }

    .card {
      background: #1c1c1c;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      margin-top: 10px;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }
  </style>
</head>

<body>

<header>
  <h1>⚽ Shop</h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
  </nav>
</header>

<section class="products">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1511886929837-354d827aae26">
    <h3>Nike Boots</h3>
    <p>$120</p>
    <button>Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1521412644187-c49fa049e84d">
    <h3>Adidas Jersey</h3>
    <p>$80</p>
    <button>Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1522778119026-d647f0596c20">
  <img src="https://images.unsplash.com/photo
    <p>$40</p>
    <button>Add to Cart</button>
  </div>

</section>
